<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Bolt (雷电)" />
  <title>雷电 Bolt</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <link rel="stylesheet" href="/src/styles/index.css" />

  <script type="text/javascript">
    (function (c, l, a, r, i, t, y) {
      c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
      t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
      y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
    })(window, document, "clarity", "script", "jxmn1qjx88");
  </script>
</head>

<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD Overlay -->
    <div id="hud" class="hud" style="display:none;">
      <div class="hud-top">
        <div id="hud-score" class="hud-score">得分：0</div>
        <div class="hud-right">
          <div id="hud-lives" class="hud-lives"></div>
          <div id="hud-bombs" class="hud-bombs"></div>
          <div id="hud-weapon" class="hud-weapon"></div>
        </div>
      </div>
      <div id="hud-boss-hp" class="hud-boss-hp hidden">
        <div class="boss-hp-label">警告</div>
        <div class="boss-hp-bar-bg">
          <div id="boss-hp-bar-fill" class="boss-hp-bar-fill"></div>
        </div>
      </div>
      <div id="hud-level" class="hud-level"></div>
    </div>

    <!-- Title Screen -->
    <div id="screen-title" class="overlay-screen">
      <div class="title-content">
        <h1 class="game-title">BOLT<span class="title-cn">雷电</span></h1>
        <button id="btn-start" class="menu-btn pulse">开始游戏</button>
        <div class="title-controls">
          <div>WASD — 移动 &nbsp;&nbsp; Shift — 慢速</div>
          <div>J — 射击 &nbsp;&nbsp; K — 炸弹</div>
          <div>1/2/3 — 切换武器</div>
        </div>
        <br />
        <div id="title-highscore" class="title-highscore"></div>
        <br /><br /><br /><br />
        <a href="https://qizhen.xyz/" target="_blank" class="home-link">
          <span>🌐</span> 访问我的个人主页
        </a>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="screen-gameover" class="overlay-screen" style="display:none;">
      <div class="overlay-content">
        <h2 class="screen-heading red-glow">游戏结束</h2>
        <div id="gameover-score" class="screen-score"></div>
        <button id="btn-continue" class="menu-btn">继续 (<span id="continues-left">3</span>)</button>
        <button id="btn-title" class="menu-btn secondary">返回标题</button>
      </div>
    </div>

    <!-- Level Clear Screen -->
    <div id="screen-levelclear" class="overlay-screen" style="display:none;">
      <div class="overlay-content">
        <h2 class="screen-heading gold-glow">关卡完成!</h2>
        <div id="levelclear-score" class="screen-score"></div>
        <button id="btn-nextlevel" class="menu-btn pulse">下一关</button>
      </div>
    </div>

    <!-- Victory Screen -->
    <div id="screen-victory" class="overlay-screen" style="display:none;">
      <div class="overlay-content">
        <h2 class="screen-heading rainbow-glow">胜利!</h2>
        <div class="victory-msg">全部 3 关已通关!</div>
        <div id="victory-score" class="screen-score"></div>
        <button id="btn-restart" class="menu-btn pulse">再玩一次</button>
        <button id="btn-title2" class="menu-btn secondary">返回标题</button>
      </div>
    </div>

    <!-- FPS Counter -->
    <div id="fps-counter" class="fps-counter">FPS: 0</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script async src="https://hm.baidu.com/hm.js?b3f6e7ec9302021671173e3fad14f4cd"></script>
</body>

</html>
